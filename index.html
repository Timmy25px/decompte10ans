<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Compteur</title>

<style>
#lockScreen {
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    font-family: Arial, sans-serif;
}

#lockScreen input {
    margin-top: 15px;
    padding: 10px;
    text-align: center;
}

#lockScreen button {
    margin-top: 10px;
    padding: 8px 20px;
}

#playButton {
    position: fixed;
    bottom: 15px;
    right: 15px;
    z-index: 9998;
    opacity: 0.55;
    background: black;
    color: white;
    border: 1px solid white;
    border-radius: 20px;
    padding: 8px 15px;
    display: none;
}

#whiteFade {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 10000;
    transition: opacity 5s ease;
}
</style>
</head>

<body>

<div id="lockScreen">
    <h2>Accès sécurisé</h2>
    <input id="passwordInput" type="password" placeholder="Code d'accès">
    <button onclick="checkPassword()">Valider</button>
</div>


<div id="content" style="display:none;">

<div style="position: relative; width: 100%; height: 0; padding-top: 66.6667%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">

<iframe loading="lazy" 
style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none;"
src="https://www.canva.com/design/DAHQHalUtOM/VW_lvRTYlOogieRFHmu3SA/view?embed"
allowfullscreen="allowfullscreen"
allow="fullscreen">
</iframe>

</div>

</div>


<audio id="bgMusic" loop>
    <source src="countdown_music.m4a" type="audio/mp4">
</audio>


<button id="playButton">▶ Play</button>

<div id="whiteFade"></div>


<script>

const correctHash =
"4af6ea0776625ccaf1d953afb986e306e66c192bffd566983d53970b6c67c76b";


async function hashText(text){
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest("SHA-256", data);

    return [...new Uint8Array(hash)]
    .map(x => x.toString(16).padStart(2,"0"))
    .join("");
}


async function checkPassword(){

    const input = document.getElementById("passwordInput").value;

    if(await hashText(input) === correctHash){

        document.getElementById("lockScreen").style.display="none";
        document.getElementById("content").style.display="block";

        startMusic();

    } else {

        alert("Code incorrect");

    }
}


const music = document.getElementById("bgMusic");
const playButton = document.getElementById("playButton");


function startMusic(){

    music.play().then(()=>{

        playButton.style.display="none";

    }).catch(()=>{

        playButton.style.display="block";

    });

}


playButton.onclick = function(){

    music.play();
    playButton.style.display="none";

};



/* Fondu musique 28/08/2032 13:42:50 UTC */

const fadeMusicDate = new Date("2032-08-28T13:42:50Z").getTime();

const whiteFadeDate = new Date("2032-08-28T13:43:59Z").getTime();


setInterval(()=>{

    const now = Date.now();


    // Fondu audio 10 secondes

    if(now >= fadeMusicDate - 10000 && now < fadeMusicDate){

        const progress = (now-(fadeMusicDate-10000))/10000;

        music.volume = Math.max(0,1-progress);

    }


    if(now >= fadeMusicDate){

        music.volume = 0;

    }


    // Fondu blanc

    if(now >= whiteFadeDate){

        document.getElementById("whiteFade").style.opacity="1";

    }


},1000);


</script>

</body>
</html>
