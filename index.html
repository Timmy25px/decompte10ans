<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
#lockScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    color: white;
    font-family: Arial, sans-serif;
}

#lockBox {
    text-align: center;
}

#lockBox input {
    padding: 12px;
    font-size: 18px;
    text-align: center;
    border-radius: 8px;
    border: none;
    outline: none;
}

#lockBox button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

#playButton {
    position: fixed;
    bottom: 15px;
    right: 15px;
    z-index: 99999;
    opacity: 0.35;
    background: black;
    color: white;
    border: 1px solid white;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
}

#playButton:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div id="lockScreen">
    <div id="lockBox">
        <h2>Code d'accès</h2>
        <input id="codeInput" type="password" placeholder="••••••">
        <br>
        <button onclick="checkCode()">Accéder</button>
    </div>
</div>


<div style="position: relative; width: 100%; height: 0; padding-top: 66.6667%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHQHalUtOM/VW_lvRTYlOogieRFHmu3SA/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>

<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHQHalUtOM&#x2F;VW_lvRTYlOogieRFHmu3SA&#x2F;view?utm_content=DAHQHalUtOM&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">_</a> par Tim Gaudinaud


<audio id="bgMusic" loop>
    <source src="https://res.cloudinary.com/zp5nbve7/video/upload/v1784754618/ezyZip_bxpow8.mp4" type="audio/mpeg">
</audio>

<button id="playButton">play</button>


<script>
const passwordHash = "4af6ea0776625ccaf1d953afb986e306e66c192bffd566983d53970b6c67c76b";

const music = document.getElementById("bgMusic");
const playButton = document.getElementById("playButton");

let fadeStarted = false;


async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return [...new Uint8Array(hash)]
        .map(x => x.toString(16).padStart(2, "0"))
        .join("");
}


async function checkCode() {
    const value = document.getElementById("codeInput").value;
    const hash = await sha256(value);

    if (hash === passwordHash) {
        document.getElementById("lockScreen").style.display = "none";

        music.play().catch(() => {});
    }
}


playButton.onclick = function() {
    music.play();
};


function checkFade() {

    const target = new Date("2032-08-28T13:42:50Z").getTime();
    const now = Date.now();

    const difference = target - now;


    if (difference <= 10000 && difference > 0 && !fadeStarted) {

        fadeStarted = true;

        let volume = music.volume;

        const interval = setInterval(() => {

            volume -= 0.01;

            if (volume <= 0) {
                volume = 0;
                clearInterval(interval);
            }

            music.volume = volume;

        }, 100);

    }
}


setInterval(checkFade, 500);
</script>


</body>
</html>
